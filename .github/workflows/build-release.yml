name: Build and Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    runs-on: self-hosted

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Extract version from tag
        id: version
        shell: powershell
        run: |
          $VERSION = "${{ github.ref_name }}".TrimStart('v')
          echo "version=$VERSION" >> $env:GITHUB_OUTPUT
          echo "Building version: $VERSION"

      - name: Update version.h (firmware version)
        shell: powershell
        run: |
          Set-Content -Path "src/version.h" -Value "#define VERSION_FIRMWARE `"${{ steps.version.outputs.version }}`""
          Get-Content "src/version.h"

      - name: Build Firmware
        shell: powershell
        run: |
          & "C:/Python314/Scripts/pio.exe" run -e esp32dev

      - name: Update data/version.txt (SPIFFS version)
        shell: powershell
        run: |
          Set-Content -Path "data/version.txt" -Value "${{ steps.version.outputs.version }}" -NoNewline
          Get-Content "data/version.txt"

      - name: Build SPIFFS
        shell: powershell
        run: |
          & "C:/Python314/Scripts/pio.exe" run -t buildfs -e esp32dev

      - name: Rename binaries
        shell: powershell
        run: |
          Copy-Item ".pio/build/esp32dev/firmware.bin" "firmware_v${{ steps.version.outputs.version }}.bin"
          Copy-Item ".pio/build/esp32dev/spiffs.bin" "spiffs_v${{ steps.version.outputs.version }}.bin"

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          files: |
            firmware_v${{ steps.version.outputs.version }}.bin
            spiffs_v${{ steps.version.outputs.version }}.bin
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Update firmware_prod branch
        shell: powershell
        run: |
          $tempDir = "C:\temp_firmware"
          New-Item -ItemType Directory -Force -Path $tempDir
          Copy-Item ".pio/build/esp32dev/firmware.bin" "$tempDir/firmware.bin"
          Copy-Item ".pio/build/esp32dev/spiffs.bin" "$tempDir/spiffs.bin"

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git reset --hard HEAD
          git fetch origin

          $branchExists = git ls-remote --heads origin firmware_prod
          if ($branchExists) {
            git checkout -B firmware_prod origin/firmware_prod
          } else {
            git checkout --orphan firmware_prod
            git reset --hard
          }

          New-Item -ItemType Directory -Force -Path "build"
          Copy-Item "$tempDir/firmware.bin" "build/firmware.bin"
          Copy-Item "$tempDir/spiffs.bin" "build/spiffs.bin"
          $json = @{ firmware = "${{ steps.version.outputs.version }}"; spiffs = "${{ steps.version.outputs.version }}" } | ConvertTo-Json
          Set-Content -Path "version.json" -Value $json

          git add build/firmware.bin build/spiffs.bin version.json
          git commit -m "Update firmware to v${{ steps.version.outputs.version }}"
          git push origin firmware_prod
